volumes:
  rs-emqx-data-vol:
  rs-emqx-log-vol:

services:
  rs-emqx:
    image: emqx/emqx:latest
    container_name: rs-emqx
    ports:
      - "1883:1883" # MQTT protocol
      - "8083:8083" # MQTT over WebSocket
      # - "8084:8084" # MQTT over WebSocket Secure(WSS)
      # - "8883:8883" # MQTT over TLS
      - "18083:18083" # EMQX Dashboard
    volumes:
      - rs-emqx-data-vol:/opt/emqx/data
      - rs-emqx-log-vol:/opt/emqx/log
