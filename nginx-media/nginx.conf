
load_module /usr/local/nginx/modules/ngx_http_flv_live_module.so;

user  nginx;

#user  nobody;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}

rtmp_auto_push on;
rtmp_auto_push_reconnect 1s;
rtmp_socket_dir /tmp;

# RTMP服务
rtmp {
    out_queue           4096;
    out_cork            8;
    max_streams         128;
    # timeout             15s;
    # drop_idle_publisher 15s;

    server {
        listen 1935; # 监听端口
        chunk_size 4000;
		
        application live {
            live on;
			gop_cache on;
            idle_streams off;
			
            on_publish http://44.53.59.108:9919/notification-callback/on-publish;
			      on_play http://44.53.59.108:9919/notification-callback/on-playing;
			      on_done http://44.53.59.108:9919/notification-callback/on-finished;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    gzip  on;

	add_header 'Access-Control-Allow-Origin' '*';
	add_header 'Access-Control-Allow-Methods' '*';
	add_header 'Access-Control-Allow-Headers' '*';

    server {
        listen       80;
        server_name  localhost;

        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        location / {
            root   html;
            index  index.html index.htm;
        }
        location /livestream {
			add_header 'Access-Control-Allow-Origin' '*';
			add_header 'Access-Control-Allow-Crednentials' 'true';
            flv_live on;
            chunked_transfer_encoding on;
		}
        
		# location /stat.xsl {
        #     root html;
        # }
		location /stat {
            rtmp_stat all;
            rtmp_stat_format json;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

