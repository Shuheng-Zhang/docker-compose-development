volumes:
  rs-kafka-data-vol:
  rs-kafka-secrets-vol:
  rs-kafka-config-vol:
  rs-kafkamap-vol:

networks:
  kafka-net:
    # ipam:
    #   config:
    #     - subnet: 172.29.0.0/16
    #       gateway: 172.29.0.1
    driver: bridge

services:
  rs-kafka:
    image: apache/kafka:latest
    container_name: kafka
    hostname: kafka-1
    networks:
      - kafka-net
    # networks:
    #   kafka-net:
    #     ipv4_address: 172.29.0.2
    ports:
      - "9092:9092"
    environment:
      # - KAFKA_CFG_NODE_ID=0
      # - KAFKA_CFG_PROCESS_ROLES=controller,broker
      # - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      # - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      # - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      
      # 必须设置唯一的 cluster ID（首次启动前生成）
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"  # ← 可自定义或用命令生成（见下方说明）
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"  # ← 替换为你的宿主机IP
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"  # 数据存储路径（可持久化）
    volumes:
      - rs-kafka-data-vol:/var/lib/kafka/data
      - rs-kafka-secrets-vol:/etc/kafka/secrets
      - rs-kafka-config-vol:/mnt/shared/config

  # Kafka GUI Management
  rs-kafka-map:
    image: dushixiang/kafka-map
    container_name: kafka-map
    networks:
      - kafka-net
    ports:
      - "9090:8080"
    volumes:
      - rs-kafkamap-vol:/usr/local/kafka-map/data
    environment:
      - DEFAULT_USERNAME=admin
      - DEFAULT_PASSWORD=1q2w3e4r5t
    depends_on:
      - rs-kafka
