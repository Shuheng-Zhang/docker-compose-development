# 全局配置
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# 事件模块配置
events {
    worker_connections  1024;  # 每个 worker 进程的最大连接数
}

# Stream 模块配置（用于 TCP/UDP 负载均衡）
stream {
    # 定义 RabbitMQ STOMP 集群的上游服务器
    upstream rabbitmq_stomp_cluster {
        server rabbitmq1:61613;  # RabbitMQ 节点 1
        server rabbitmq2:61613;  # RabbitMQ 节点 2
        server rabbitmq3:61613;  # RabbitMQ 节点 3

        # 负载均衡策略（默认是轮询）
        # least_conn;  # 最少连接数策略
    }

    log_format stomp_log '$remote_addr [$time_local] '
                 '$protocol $status $bytes_sent $bytes_received '
                 '$session_time "$upstream_addr" '
                 '"$upstream_bytes_sent" "$upstream_bytes_received" "$upstream_connect_time"';
    # STOMP 协议的负载均衡服务器
    server {
        listen 61613;  # 监听 STOMP 协议的默认端口
        proxy_pass rabbitmq_stomp_cluster;  # 转发到上游服务器

        # 超时设置
        proxy_timeout 10s;  # 代理超时时间
        proxy_connect_timeout 5s;  # 连接超时时间

        # 日志记录
        access_log /var/log/nginx/stomp_access.log stomp_log;
        error_log /var/log/nginx/stomp_error.log;
    }
}

# HTTP 模块配置（可选，用于管理界面或健康检查）
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  http_log  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  http_log;

    sendfile        on;
    keepalive_timeout  65;

    # RabbitMQ 管理界面的负载均衡（可选）
    upstream rabbitmq_management {
        server rabbitmq1:15672;
        server rabbitmq2:15672;
        server rabbitmq3:15672;
    }

    # HTTP 服务器配置（用于管理界面）
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://rabbitmq_management;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
