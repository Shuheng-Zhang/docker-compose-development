services:
  rabbitmq1:
    image: rabbitmq:management-alpine
    container_name: cluster-rabbitmq1
    hostname: rabbitmq1
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_NODENAME: "rabbit@rabbitmq1"
    volumes:
      - cluster_rabbitmq1_data:/var/lib/rabbitmq
      - ./erlang.cookie:/var/lib/rabbitmq/.erlang.cookie
      - ./rabbit_enabled_plugins:/etc/rabbitmq/enabled_plugins
    networks:
      - rabbitmq_network

  rabbitmq2:
    image: rabbitmq:management-alpine
    container_name: cluster-rabbitmq2
    hostname: rabbitmq2
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_NODENAME: "rabbit@rabbitmq2"
    volumes:
      - cluster_rabbitmq2_data:/var/lib/rabbitmq
      - ./erlang.cookie:/var/lib/rabbitmq/.erlang.cookie
      - ./rabbit_enabled_plugins:/etc/rabbitmq/enabled_plugins
    networks:
      - rabbitmq_network
    depends_on:
      - rabbitmq1

  rabbitmq3:
    image: rabbitmq:management-alpine
    container_name: cluster-rabbitmq3
    hostname: rabbitmq3
    ports:
      - "5674:5672"
      - "15674:15672"
    environment:
      RABBITMQ_NODENAME: "rabbit@rabbitmq3"
    volumes:
      - cluster_rabbitmq3_data:/var/lib/rabbitmq
      - ./erlang.cookie:/var/lib/rabbitmq/.erlang.cookie
      - ./rabbit_enabled_plugins:/etc/rabbitmq/enabled_plugins
    networks:
      - rabbitmq_network
    depends_on:
      - rabbitmq1

  nginx:
    image: nginx:latest
    ports:
      - "61613:61613"
      - "8089:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - rabbitmq_network
    depends_on:
      - rabbitmq1
      - rabbitmq2
      - rabbitmq3

volumes:
  cluster_rabbitmq1_data:
  cluster_rabbitmq2_data:
  cluster_rabbitmq3_data:

networks:
  rabbitmq_network:
    driver: bridge
