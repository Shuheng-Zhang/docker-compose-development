services:
  redis-node1:
    image: redis:latest
    container_name: redis-node1
    ports:
      - "7001:6379"
      - "17001:16379"
    volumes:
      - ./data/redis-node-1:/data
      - ./redis-1/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    networks:
      redis_network:
        ipv4_address: 172.50.0.2

  redis-node2:
    image: redis:latest
