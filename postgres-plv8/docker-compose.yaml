volumes:
  rs-postgres-js-vol:

services:
  rs-postgres:
    image: postgres-plv8:alpine
    container_name: "rs-postgres-js"
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "5442:5432"
    volumes:
      - $PWD/postgresql.conf:/etc/postgresql/postgresql.conf
      - rs-postgres-js-vol:/var/lib/postgresql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
